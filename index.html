<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>MedAtlas — Visor Anatómico</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0c0f; color: #c8d0d8; height: 100vh; overflow: hidden;
  }

  /* Layout Base */
  #app {
    display: grid;
    grid-template-columns: 260px 1fr;
    grid-template-rows: 50px 1fr 90px;
    height: 100vh;
  }

  /* --- BARRA SUPERIOR --- */
  #topbar {
    grid-column: 1 / -1; background: #111418; border-bottom: 1px solid #1e2530;
    display: flex; align-items: center; padding: 0 15px; gap: 10px;
  }
  #topbar h1 { font-size: 14px; font-weight: 600; color: #7ab3e0; text-transform: uppercase; flex-grow: 1; }
  
  /* Botón de Menú para Móvil */
  #menu-toggle {
    display: none; background: #1a2535; border: 1px solid #3a7abf; color: #7ab3e0;
    padding: 5px 10px; border-radius: 4px; font-size: 12px; cursor: pointer;
  }

  /* --- SIDEBAR --- */
  #sidebar {
    background: #0d1117; border-right: 1px solid #1a2030; overflow-y: auto; padding: 10px 0;
    transition: transform 0.3s ease;
  }

  .sidebar-title { padding: 10px 15px; font-size: 10px; color: #4a6a8a; text-transform: uppercase; letter-spacing: 1px; }
  .sys-group { margin-bottom: 5px; }
  .sys-header { display: flex; align-items: center; padding: 12px 15px; cursor: pointer; font-size: 13px; color: #8a9bb0; }
  .sys-arrow { margin-left: auto; font-size: 10px; transition: transform 0.2s; }
  .sys-header.open .sys-arrow { transform: rotate(90deg); }
  .series-list { display: none; padding-bottom: 5px; }
  .series-list.open { display: block; }
  .series-item { padding: 12px 15px 12px 35px; font-size: 13px; color: #6a7b8e; cursor: pointer; border-left: 3px solid transparent; }
  .series-item.active { color: #7ab3e0; border-left-color: #3a7abf; background: #0e1a28; }

  /* --- VISOR --- */
  #viewer { background: #000; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  #main-img { max-width: 100%; max-height: 100%; object-fit: contain; }
  #overlay { position: absolute; inset: 0; pointer-events: none; }
  
  .label-dot { position: absolute; transform: translate(-50%, -50%); }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #00d4ff; border: 1.5px solid #fff; box-shadow: 0 0 10px rgba(0,212,255,0.5); }
  .label-text { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); white-space: nowrap; font-size: 11px; color: #00d4ff; background: rgba(0, 0, 0, 0.85); padding: 3px 8px; border-radius: 4px; border: 1px solid rgba(0,212,255,0.3); }

  #slice-counter { position: absolute; bottom: 10px; right: 10px; font-size: 12px; color: #7ab3e0; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 4px; font-family: monospace; }

  /* --- CONTROLES --- */
  #controlbar {
    grid-column: 1 / -1; background: #0d1117; border-top: 1px solid #1a2030;
    display: flex; flex-direction: column; justify-content: center; padding: 10px 20px; gap: 10px;
  }
  .slider-container { display: flex; align-items: center; width: 100%; gap: 15px; }
  #slice-slider { flex-grow: 1; height: 15px; accent-color: #3a7abf; }
  #toggle-labels { 
    width: 100%; padding: 10px; background: #1a2535; color: #7ab3e0; 
    border: 1px solid #3a7abf; border-radius: 6px; font-size: 13px; font-weight: 600;
  }
  #toggle-labels.active { background: #3a7abf; color: #fff; }

  /* =============================================
     AJUSTES PARA MÓVIL (Media Queries)
     ============================================= */
  @media (max-width: 768px) {
    #app { grid-template-columns: 1fr; }
    
    #menu-toggle { display: block; }
    
    #sidebar {
      position: absolute; top: 50px; left: 0; bottom: 90px; z-index: 100;
      width: 280px; transform: translateX(-100%); box-shadow: 10px 0 20px rgba(0,0,0,0.5);
    }
    #sidebar.show { transform: translateX(0); }

    #topbar h1 { font-size: 12px; }
    .series-item { padding: 15px 15px 15px 35px; font-size: 14px; } /* Más grande para dedos */
    
    #controlbar { padding: 10px 15px; }
    #toggle-labels { padding: 12px; }
  }

  #loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #000; z-index: 10; }
  .spinner { width: 40px; height: 40px; border: 3px solid #1a2535; border-top-color: #3a7abf; border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="app">
  <div id="topbar">
    <button id="menu-toggle">ÍNDICE</button>
    <h1>MedAtlas</h1>
    <div class="tb-badge" id="modality-badge">RM</div>
  </div>

  <div id="sidebar">
    <div class="sidebar-title">Estudios Disponibles</div>
    <div id="menu-content"></div>
  </div>

  <div id="viewer">
    <div id="loading" style="display:none"><div class="spinner"></div></div>
    <img id="main-img" src="" alt="Visor" />
    <div id="overlay"></div>
    <div id="slice-counter">0 / 0</div>
  </div>

  <div id="controlbar">
    <div class="slider-container">
      <span style="font-size: 11px; color: #4a6a8a;">CORTE</span>
      <input type="range" id="slice-slider" min="1" value="1" disabled />
    </div>
    <button id="toggle-labels">MOSTRAR ETIQUETAS</button>
  </div>
</div>

<script>
const CONFIG = {
  systems: [
    {
      name: 'Sistema Nervioso Central',
      series: [
        {
          id: 'snc-t1', name: 'Resonancia T1', modality: 'RM T1', totalSlices: 30,
          slices: Array.from({length: 30}, (_, i) => `img/MRI/slice_${String(i+1).padStart(3, '0')}.png`),
          labels: [
            { name: 'Corteza Cerebral', x: 30, y: 25, slice: -1 },
            { name: 'Ventrículos', x: 50, y: 45, slice: 15 }
          ]
        },
        { id: 'snc-t2', name: 'Resonancia T2', modality: 'RM T2', totalSlices: 0, slices: [] },
        { id: 'snc-tac', name: 'Tomografía', modality: 'TC Cerebro', totalSlices: 0, slices: [] }
      ]
    },
    {
      name: 'Tórax',
      series: [
        { id: 'torax-pulmon', name: 'TC Pulmón', modality: 'TC', totalSlices: 0, slices: [] }
      ]
    }
  ]
};

const state = { activeSeries: null, currentSlice: 1, labelsVisible: false };

const sidebar = document.getElementById('sidebar');
const menuContent = document.getElementById('menu-content');
const mainImg = document.getElementById('main-img');
const overlay = document.getElementById('overlay');
const sliceSlider = document.getElementById('slice-slider');
const sliceCounter = document.getElementById('slice-counter');
const toggleBtn = document.getElementById('toggle-labels');
const menuToggle = document.getElementById('menu-toggle');
const loading = document.getElementById('loading');

function init() {
  CONFIG.systems.forEach(sys => {
    const group = document.createElement('div');
    group.className = 'sys-group';
    group.innerHTML = `<div class="sys-header"><span>${sys.name}</span><span class="sys-arrow">▶</span></div>`;
    
    const list = document.createElement('div');
    list.className = 'series-list';
    
    sys.series.forEach(ser => {
      const item = document.createElement('div');
      item.className = 'series-item';
      item.textContent = ser.name;
      item.onclick = () => {
        if (ser.totalSlices > 0) {
          selectSeries(ser);
          if (window.innerWidth <= 768) sidebar.classList.remove('show');
        } else {
          alert("Sin imágenes cargadas.");
        }
      };
      list.appendChild(item);
    });

    group.querySelector('.sys-header').onclick = () => {
      const isOpen = list.classList.toggle('open');
      group.querySelector('.sys-header').classList.toggle('open', isOpen);
    };

    group.appendChild(list);
    menuContent.appendChild(group);
  });
}

function selectSeries(ser) {
  state.activeSeries = ser;
  state.currentSlice = 1;
  sliceSlider.max = ser.totalSlices;
  sliceSlider.disabled = false;
  document.getElementById('modality-badge').textContent = ser.modality;
  document.querySelectorAll('.series-item').forEach(el => el.classList.toggle('active', el.textContent === ser.name));
  loadSlice(1);
}

function loadSlice(n) {
  if (!state.activeSeries) return;
  state.currentSlice = n;
  sliceSlider.value = n;
  sliceCounter.textContent = `${n} / ${state.activeSeries.totalSlices}`;
  
  loading.style.display = 'flex';
  const img = new Image();
  img.onload = () => {
    mainImg.src = img.src;
    loading.style.display = 'none';
    renderLabels();
  };
  img.src = state.activeSeries.slices[n - 1];
}

function renderLabels() {
  overlay.innerHTML = '';
  if (!state.labelsVisible || !state.activeSeries) return;
  state.activeSeries.labels.forEach(lbl => {
    if (lbl.slice !== -1 && lbl.slice !== state.currentSlice) return;
    const div = document.createElement('div');
    div.className = 'label-dot';
    div.style.left = lbl.x + '%';
    div.style.top = lbl.y + '%';
    div.innerHTML = `<div class="dot"></div><div class="label-text">${lbl.name}</div>`;
    overlay.appendChild(div);
  });
}

menuToggle.onclick = () => sidebar.classList.toggle('show');
sliceSlider.oninput = (e) => loadSlice(parseInt(e.target.value));
toggleBtn.onclick = () => {
  state.labelsVisible = !state.labelsVisible;
  toggleBtn.classList.toggle('active');
  toggleBtn.textContent = state.labelsVisible ? 'OCULTAR ETIQUETAS' : 'MOSTRAR ETIQUETAS';
  renderLabels();
};

// Navegación con Scroll / Touch
document.getElementById('viewer').onwheel = (e) => {
  if (!state.activeSeries) return;
  const next = state.currentSlice + (e.deltaY > 0 ? 1 : -1);
  if (next >= 1 && next <= state.activeSeries.totalSlices) loadSlice(next);
};

init();
</script>
</body>
</html>
