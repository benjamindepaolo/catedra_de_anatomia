<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MedAtlas — Visor Anatómico Educativo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0c0f;
    color: #c8d0d8;
    height: 100vh;
    overflow: hidden;
  }
  #app {
    display: grid;
    grid-template-columns: 260px 1fr;
    grid-template-rows: 48px 1fr 80px;
    height: 100vh;
  }
  #topbar {
    grid-column: 1 / -1;
    background: #111418;
    border-bottom: 1px solid #1e2530;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
  }
  #topbar h1 {
    font-size: 13px;
    font-weight: 500;
    color: #7ab3e0;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .tb-badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 3px;
    background: #1a2535;
    color: #4a8ab5;
    border: 1px solid #1e3a55;
  }
  #status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #2a7a4a;
    margin-left: auto;
  }
  #sidebar {
    background: #0d1117;
    border-right: 1px solid #1a2030;
    overflow-y: auto;
    padding: 12px 0;
  }
  .sidebar-title {
    padding: 8px 14px 12px;
    font-size: 10px;
    color: #3a5070;
    letter-spacing: .08em;
    text-transform: uppercase;
    border-bottom: 1px solid #141c28;
    margin-bottom: 8px;
  }
  .sys-group { margin-bottom: 4px; }
  .sys-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 12px;
    color: #8a9bb0;
    text-transform: uppercase;
    user-select: none;
  }
  .sys-arrow { margin-left: auto; font-size: 10px; transition: transform .2s; }
  .sys-header.open .sys-arrow { transform: rotate(90deg); }
  .series-list { display: none; }
  .series-list.open { display: block; }
  .series-item {
    padding: 7px 14px 7px 36px;
    font-size: 12px;
    color: #6a7b8e;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .series-item:hover { color: #a0b4c8; background: #111820; }
  .series-item.active {
    color: #7ab3e0;
    border-left: 2px solid #3a7abf;
    background: #0e1a28;
  }
  #viewer {
    background: #000;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #main-img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: none;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  .label-dot {
    position: absolute;
    transform: translate(-50%, -50%);
  }
  .label-dot .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #00d4ff;
    border: 1px solid #fff;
  }
  .label-dot .label-text {
    position: absolute;
    left: 20px; top: 50%;
    transform: translateY(-50%);
    white-space: nowrap;
    font-size: 11px;
    color: #00d4ff;
    background: rgba(0, 0, 0, .8);
    padding: 2px 7px;
    border-radius: 3px;
  }
  #slice-counter {
    position: absolute;
    bottom: 12px; right: 12px;
    font-size: 12px;
    color: #5a7a9a;
    background: rgba(0, 0, 0, .65);
    padding: 4px 10px;
    border-radius: 3px;
  }
  #controlbar {
    grid-column: 1 / -1;
    background: #0d1117;
    border-top: 1px solid #1a2030;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
  }
  #slice-slider { flex: 1; accent-color: #3a7abf; }
  #toggle-labels {
    padding: 8px 18px;
    font-size: 12px;
    background: #0e1a28;
    color: #5a9acf;
    border: 1px solid #2a4a6a;
    border-radius: 4px;
    cursor: pointer;
  }
  #toggle-labels.active { color: #00d4ff; border-color: #00d4ff; }
</style>
</head>
<body>

<div id="app">
  <div id="topbar">
    <h1>MedAtlas</h1>
    <div class="tb-badge" id="modality-badge">—</div>
    <div id="status-dot"></div>
  </div>

  <div id="sidebar">
    <div class="sidebar-title">Índice Anatómico</div>
  </div>

  <div id="viewer">
    <img id="main-img" />
    <div id="overlay"></div>
    <div id="slice-counter"></div>
  </div>

  <div id="controlbar">
    <input type="range" id="slice-slider" min="1" value="1" disabled />
    <button id="toggle-labels">Toggle Labels</button>
  </div>
</div>

<script>
const CONFIG = {
  systems: [
    {
      id: 'snc',
      name: 'Sistema Nervioso Central',
      series: [
        {
          id: 'snc-mri',
          name: 'Resonancia Magnética',
          modality: 'RM Cerebro',
          totalSlices: 30,
          slices: Array.from({length: 30}, (_, i) => 
            `img/MRI/slice_${String(i + 1).padStart(3, '0')}.png`
          ),
          labels: [
            { name: 'Ventrículo lateral', x: 45, y: 40, slice: 15 },
            { name: 'Corteza cerebral', x: 20, y: 30, slice: -1 }
          ]
        }
      ]
    }
  ]
};

const state = { activeSeries: null, currentSlice: 1, labelsVisible: false };

const sidebar = document.getElementById('sidebar');
const mainImg = document.getElementById('main-img');
const overlay = document.getElementById('overlay');
const sliceCount = document.getElementById('slice-counter');
const sliceSlider = document.getElementById('slice-slider');
const toggleBtn = document.getElementById('toggle-labels');
const modBadge = document.getElementById('modality-badge');

function buildSidebar() {
  CONFIG.systems.forEach(sys => {
    const group = document.createElement('div');
    group.className = 'sys-group';
    const header = document.createElement('div');
    header.className = 'sys-header open';
    header.innerHTML = `<span>${sys.name}</span><span class="sys-arrow">&#9658;</span>`;
    
    const list = document.createElement('div');
    list.className = 'series-list open';
    
    sys.series.forEach(ser => {
      const item = document.createElement('div');
      item.className = 'series-item';
      item.innerHTML = `<span>${ser.name}</span>`;
      item.onclick = () => selectSeries(ser);
      list.appendChild(item);
    });
    group.appendChild(header);
    group.appendChild(list);
    sidebar.appendChild(group);
  });
}

function selectSeries(ser) {
  state.activeSeries = ser;
  state.currentSlice = 1;
  sliceSlider.max = ser.totalSlices;
  sliceSlider.value = 1;
  sliceSlider.disabled = false;
  modBadge.textContent = ser.modality;
  loadSlice(1);
}

function loadSlice(n) {
  if (!state.activeSeries) return;
  state.currentSlice = n;
  mainImg.src = state.activeSeries.slices[n - 1];
  mainImg.style.display = 'block';
  sliceCount.textContent = `${n} / ${state.activeSeries.totalSlices}`;
  renderLabels();
}

function renderLabels() {
  overlay.innerHTML = '';
  if (!state.labelsVisible || !state.activeSeries) return;
  state.activeSeries.labels.forEach(lbl => {
    if (lbl.slice !== -1 && lbl.slice !== state.currentSlice) return;
    const dot = document.createElement('div');
    dot.className = 'label-dot';
    dot.style.left = lbl.x + '%';
    dot.style.top = lbl.y + '%';
    dot.innerHTML = `<div class="dot"></div><span class="label-text">${lbl.name}</span>`;
    overlay.appendChild(dot);
  });
}

sliceSlider.oninput = (e) => loadSlice(parseInt(e.target.value));

toggleBtn.onclick = () => {
  state.labelsVisible = !state.labelsVisible;
  toggleBtn.classList.toggle('active');
  renderLabels();
};

document.getElementById('viewer').onwheel = (e) => {
  if (!state.activeSeries) return;
  const next = state.currentSlice + (e.deltaY > 0 ? 1 : -1);
  if (next >= 1 && next <= state.activeSeries.totalSlices) {
    sliceSlider.value = next;
    loadSlice(next);
  }
};

buildSidebar();
</script>
</body>
</html>
